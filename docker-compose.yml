version: '3.8'

services:
  server:
    build: ./server
    container_name: standup_server
    ports:
      - '5500:5500'
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/standup_tracker
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  client:
    build: ./client
    container_name: standup_client
    ports:
      - '5173:5173'
    env_file:
      - ./client/.env
    depends_on:
      - server
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: standup_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: standup_tracker
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100

  redis:
    image: redis:7-alpine
    container_name: standup_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: