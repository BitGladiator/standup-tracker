server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: standup-tracker
    static_configs:
      - targets:
          - localhost
        labels:
          job: standup-tracker
          env: production
          __path__: /var/log/standup-tracker/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            requestId: requestId
            userId: userId
            durationMs: durationMs
            statusCode: statusCode
      - labels:
          level:
          requestId:
      - match:
          selector: '{job="standup-tracker"} |= "error"'
          stages:
            - labels:
                error: "true"