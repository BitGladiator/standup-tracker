name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify deployment starting
        run: |
          echo "Deploying commit ${{ github.sha }} to production"


      - name: Build Docker image
        working-directory: server
        run: |
          docker build -t standup-tracker-server:${{ github.sha }} .
          docker build -t standup-tracker-server:latest .

      - name: Run smoke test against built image
        run: |
          docker run -d \
            --name test-server \
            -p 5500:5500 \
            -e NODE_ENV=test \
            -e DATABASE_URL=postgresql://fake \
            -e REDIS_URL=redis://fake \
            -e JWT_SECRET=test \
            standup-tracker-server:latest || true

          sleep 3
          docker stop test-server || true
          docker rm test-server || true

      - name: Deployment ready
        run: |
          echo "All checks passed. Image standup-tracker-server:${{ github.sha }} is ready to deploy."
          echo "SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"